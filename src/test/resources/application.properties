spring.application.name=notificacao-api-test

spring.datasource.url=jdbc:h2:mem:notificacao_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=notificacao-api-test-secret-key-32-characters-minimum
app.jwt.expiration-minutes=60

whatsapp.gateway.base-url=http://localhost:3001
whatsapp.gateway.api-key=test-api-key
