spring.application.name=notificacao-api
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.jpa.properties.hibernate.default_schema=public

springdoc.swagger-ui.use-root-path=true
server.forward-headers-strategy=framework
springdoc.swagger-ui.path=/swagger-ui.html

app.swagger.server-url=${APP_SWAGGER_SERVER_URL:http://localhost:8080/api}

app.jwt.secret=${JWT_SECRET:notificacao-api-local-secret-key-32-characters-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}

whatsapp.gateway.base-url=${WHATSAPP_GATEWAY_BASE_URL}
whatsapp.gateway.api-key=${WHATSAPP_GATEWAY_API_KEY}
