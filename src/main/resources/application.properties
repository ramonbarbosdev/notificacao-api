spring.application.name=notificacao-api
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.jpa.properties.hibernate.default_schema=public

springdoc.swagger-ui.use-root-path=true
server.forward-headers-strategy=framework
springdoc.swagger-ui.path=/swagger-ui.html

app.swagger.server-url=${APP_SWAGGER_SERVER_URL:http://localhost:8080/api}

app.jwt.secret=${JWT_SECRET:notificacao-api-local-secret-key-32-characters-minimum}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}

whatsapp.gateway.base-url=${WHATSAPP_GATEWAY_BASE_URL}
whatsapp.gateway.api-key=${WHATSAPP_GATEWAY_API_KEY}
whatsapp.conexao.cooldown-segundos=${WHATSAPP_CONEXAO_COOLDOWN_SEGUNDOS:30}

# Protecao operacional de envio
notificacao.protecao.limite-por-minuto=${NOTIFICACAO_LIMITE_POR_MINUTO:5}
notificacao.protecao.limite-por-hora=${NOTIFICACAO_LIMITE_POR_HORA:60}
notificacao.protecao.limite-por-dia=${NOTIFICACAO_LIMITE_POR_DIA:300}

# Delay aleatorio entre envios
notificacao.protecao.delay-minimo-segundos=${NOTIFICACAO_DELAY_MINIMO_SEGUNDOS:15}
notificacao.protecao.delay-maximo-segundos=${NOTIFICACAO_DELAY_MAXIMO_SEGUNDOS:60}

# Janela permitida de envio
notificacao.protecao.inicio-permitido=${NOTIFICACAO_INICIO_PERMITIDO:08:00}
notificacao.protecao.fim-permitido=${NOTIFICACAO_FIM_PERMITIDO:18:00}
notificacao.protecao.fuso-horario=${NOTIFICACAO_FUSO_HORARIO:America/Bahia}

# Retry e seguranca da sessao
notificacao.protecao.maximo-tentativas=${NOTIFICACAO_MAXIMO_TENTATIVAS:3}
notificacao.protecao.pausa-automatica-segundos=${NOTIFICACAO_PAUSA_AUTOMATICA_SEGUNDOS:900}
notificacao.protecao.maximo-falhas-consecutivas=${NOTIFICACAO_MAXIMO_FALHAS_CONSECUTIVAS:5}
notificacao.protecao.janela-duplicidade-minutos=${NOTIFICACAO_JANELA_DUPLICIDADE_MINUTOS:60}

# Processamento da fila
notificacao.protecao.tamanho-lote-agendador=${NOTIFICACAO_TAMANHO_LOTE_AGENDADOR:1}
notificacao.protecao.intervalo-agendador-millis=${NOTIFICACAO_INTERVALO_AGENDADOR_MILLIS:5000}
notificacao.protecao.tamanho-maximo-lote=${NOTIFICACAO_TAMANHO_MAXIMO_LOTE:50}
