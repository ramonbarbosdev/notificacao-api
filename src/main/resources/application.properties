spring.application.name=notificacao-api
server.servlet.context-path=/api

app.saas.central.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?sslmode=${DB_SSLMODE}
app.saas.central.username=${DB_USERNAME}
app.saas.central.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.jpa.properties.hibernate.default_schema=public

springdoc.swagger-ui.use-root-path=true
server.forward-headers-strategy=framework
springdoc.swagger-ui.path=/swagger-ui.html

app.swagger.server-url=${APP_SWAGGER_SERVER_URL}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES}

whatsapp.gateway.base-url=${WHATSAPP_GATEWAY_BASE_URL}
whatsapp.gateway.api-key=${WHATSAPP_GATEWAY_API_KEY}
whatsapp.conexao.cooldown-segundos=${WHATSAPP_CONEXAO_COOLDOWN_SEGUNDOS}

# Protecao operacional de envio
notificacao.protecao.limite-por-minuto=${NOTIFICACAO_LIMITE_POR_MINUTO}
notificacao.protecao.limite-por-hora=${NOTIFICACAO_LIMITE_POR_HORA}
notificacao.protecao.limite-por-dia=${NOTIFICACAO_LIMITE_POR_DIA}

# Delay aleatorio entre envios
notificacao.protecao.delay-minimo-segundos=${NOTIFICACAO_DELAY_MINIMO_SEGUNDOS}
notificacao.protecao.delay-maximo-segundos=${NOTIFICACAO_DELAY_MAXIMO_SEGUNDOS}

# Janela permitida de envio
notificacao.protecao.inicio-permitido=${NOTIFICACAO_INICIO_PERMITIDO}
notificacao.protecao.fim-permitido=${NOTIFICACAO_FIM_PERMITIDO}
notificacao.protecao.fuso-horario=${NOTIFICACAO_FUSO_HORARIO}

# Retry e seguranca da sessao
notificacao.protecao.maximo-tentativas=${NOTIFICACAO_MAXIMO_TENTATIVAS}
notificacao.protecao.pausa-automatica-segundos=${NOTIFICACAO_PAUSA_AUTOMATICA_SEGUNDOS}
notificacao.protecao.maximo-falhas-consecutivas=${NOTIFICACAO_MAXIMO_FALHAS_CONSECUTIVAS}
notificacao.protecao.janela-duplicidade-minutos=${NOTIFICACAO_JANELA_DUPLICIDADE_MINUTOS}

# Processamento da fila
notificacao.protecao.tamanho-lote-agendador=${NOTIFICACAO_TAMANHO_LOTE_AGENDADOR}
notificacao.protecao.intervalo-agendador-millis=${NOTIFICACAO_INTERVALO_AGENDADOR_MILLIS}
notificacao.protecao.tamanho-maximo-lote=${NOTIFICACAO_TAMANHO_MAXIMO_LOTE}

server.port=${PORT}
